name: koureisha_kyozai
description: 高齢者向け教材生成アプリ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状態管理
  flutter_riverpod: ^2.5.1

  # ローカル保存（JSONファイルベース）
  path_provider: ^2.1.3
  path: ^1.9.0

  # APIキー安全保存
  flutter_secure_storage: ^9.2.2

  # PDF出力
  pdf: ^3.11.1
  printing: ^5.13.1

  # 画像選択
  image_picker: ^1.1.2

  # ファイル保存・共有
  share_plus: ^12.0.2
  file_picker: ^8.1.2

  # Gemini API（オプション）
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/templates/
    - assets/fonts/
